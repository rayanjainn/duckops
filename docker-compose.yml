services:
  # ─── Data Layer ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: duckops-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: duckops
      POSTGRES_PASSWORD: duckops123
      POSTGRES_DB: duckops
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U duckops"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m

  redis:
    image: redis:7-alpine
    container_name: duckops-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --save "" --appendonly no --maxmemory 96mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 128m
        reservations:
          memory: 32m

  # ─── CI/CD ───────────────────────────────────────────────────
  jenkins:
    build:
      context: infra/jenkins
      dockerfile: Dockerfile
    container_name: duckops-jenkins
    restart: unless-stopped
    ports:
      - "8085:8080"
      - "50000:50000"
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false -Xmx1g -Xms512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
      PNPM_HOME: /var/jenkins_home/.pnpm-store
      # Keep only last 5 builds and discard workspaces after build completes.
      # Prevents jenkinsdata volume from growing unboundedly (was biggest storage sink).
      JENKINS_OPTS: "--httpPort=8080"
      CASC_JENKINS_CONFIG: /var/jenkins_home/casc_configs
    user: root
    networks:
      - default
      - k3d-duckops
    volumes:
      - jenkinsdata:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.kube:/root/.kube-host:ro
      - jenkins-pnpm-store:/var/jenkins_home/.pnpm-store
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 768m

  # ─── Microservices ──────────────────────────────────────────
  catalog-service:
    build:
      context: .
      dockerfile: apps/catalog-service/Dockerfile
      # BuildKit cache mounts need DOCKER_BUILDKIT=1 (set in .env or shell)
      args:
        BUILDKIT_INLINE_CACHE: "1"
    container_name: duckops-catalog
    restart: unless-stopped
    ports:
      - "4001:4001"
    environment:
      DATABASE_URL: postgresql://duckops:duckops123@postgres:5432/duckops
      REDIS_URL: redis://redis:6379
      PORT: "4001"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    develop:
      watch:
        - action: rebuild
          path: apps/catalog-service/src
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 64m

  provisioning-service:
    build:
      context: .
      dockerfile: apps/provisioning-service/Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
    container_name: duckops-provisioning
    restart: unless-stopped
    ports:
      - "4002:4002"
    environment:
      DATABASE_URL: postgresql://duckops:duckops123@postgres:5432/duckops
      REDIS_URL: redis://redis:6379
      JENKINS_URL: http://jenkins:8080
      PIPELINE_SERVICE_URL: http://pipeline-service:4003
      PORT: "4002"
      NODE_ENV: production
      DUCKOPS_ENV: local
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      APP_URL: ${APP_URL:-http://localhost:4002}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    volumes:
      - /tmp/duckops-projects:/tmp/duckops-projects
      - ./infra:/app/infra
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
    develop:
      watch:
        - action: rebuild
          path: apps/provisioning-service/src
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m

  pipeline-service:
    build:
      context: .
      dockerfile: apps/pipeline-service/Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
    container_name: duckops-pipeline
    restart: unless-stopped
    ports:
      - "4003:4003"
    environment:
      DATABASE_URL: postgresql://duckops:duckops123@postgres:5432/duckops
      JENKINS_URL: http://jenkins:8080
      JENKINS_USER: ${JENKINS_USER:-admin}
      JENKINS_TOKEN: ${JENKINS_TOKEN:-}
      PORT: "4003"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      jenkins:
        condition: service_started
    develop:
      watch:
        - action: rebuild
          path: apps/pipeline-service/src
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 64m

  health-service:
    build:
      context: .
      dockerfile: apps/health-service/Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
    container_name: duckops-health
    restart: unless-stopped
    ports:
      - "4004:4004"
    environment:
      DATABASE_URL: postgresql://duckops:duckops123@postgres:5432/duckops
      PORT: "4004"
      NODE_ENV: production
      KUBECONFIG: /root/.kube/config
    volumes:
      # Kubeconfig is written by setup-local.sh with the k3d server's Docker-network IP.
      # health-service uses kubectl exec to run health checks inside pods.
      - health-kube:/root/.kube
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - k3d-duckops
    develop:
      watch:
        - action: rebuild
          path: apps/health-service/src
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 64m

  ai-service:
    build:
      context: .
      dockerfile: apps/ai-service/Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
    container_name: duckops-ai
    restart: unless-stopped
    ports:
      - "4005:4005"
    environment:
      DATABASE_URL: postgresql://duckops:duckops123@postgres:5432/duckops
      PORT: "4005"
      NODE_ENV: production
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      OLLAMA_CODE_MODEL: ${OLLAMA_CODE_MODEL:-qwen2.5-coder:7b}
      OLLAMA_STACK_MODEL: ${OLLAMA_STACK_MODEL:-qwen2.5-coder:7b}
    depends_on:
      postgres:
        condition: service_healthy
    develop:
      watch:
        - action: rebuild
          path: apps/ai-service/src
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m

  # ─── API Gateway ─────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: duckops-nginx
    restart: unless-stopped
    ports:
      - "4000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - catalog-service
      - provisioning-service
      - pipeline-service
      - health-service
      - ai-service
    deploy:
      resources:
        limits:
          memory: 64m
        reservations:
          memory: 16m

volumes:
  pgdata:
  redisdata:
  jenkinsdata:
  jenkins-pnpm-store:
  health-kube:

networks:
  default:
  k3d-duckops:
    external: true
