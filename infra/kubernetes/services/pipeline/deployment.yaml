apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipeline-service
  namespace: duckops
  labels:
    app: pipeline-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pipeline-service
  template:
    metadata:
      labels:
        app: pipeline-service
    spec:
      containers:
        - name: pipeline-service
          image: k3d-duckops-registry:5111/pipeline-service:latest
          ports:
            - containerPort: 4003
          env:
            - name: PORT
              value: "4003"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: duckops-secrets
                  key: database-url
            - name: NODE_ENV
              value: production
            - name: JENKINS_URL
              value: "http://jenkins:8080"
            - name: JENKINS_USER
              value: "admin"
            - name: JENKINS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: jenkins-token
                  key: JENKINS_TOKEN
          readinessProbe:
            httpGet:
              path: /health
              port: 4003
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
