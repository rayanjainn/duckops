            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "count(kube_pod_status_phase{phase=\"Running\"})",
              "legendFormat": "Running",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "yellow", "value": 1},
                  {"color": "green", "value": 5}
                ]
              },
              "color": {"mode": "thresholds"}
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "orientation": "auto",
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "textMode": "auto"
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Failed Pods",
          "gridPos": {"x": 8, "y": 0, "w": 8, "h": 4},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "count(kube_pod_status_phase{phase=\"Failed\"}) or vector(0)",
              "legendFormat": "Failed",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 1}
                ]
              },
              "color": {"mode": "thresholds"}
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "orientation": "auto",
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "textMode": "auto"
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Pending Pods",
          "gridPos": {"x": 16, "y": 0, "w": 8, "h": 4},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "count(kube_pod_status_phase{phase=\"Pending\"}) or vector(0)",
              "legendFormat": "Pending",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 1}
                ]
              },
              "color": {"mode": "thresholds"}
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "orientation": "auto",
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "textMode": "auto"
          }
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Pod Restarts Over Time",
          "gridPos": {"x": 0, "y": 4, "w": 24, "h": 8},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "rate(kube_pod_container_status_restarts_total[5m]) * 300",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "gradientMode": "none",
                "spanNulls": false,
                "showPoints": "auto",
                "pointSize": 5
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "green", "value": null}]
              },
              "color": {"mode": "palette-classic"}
            },
            "overrides": []
          },
          "options": {
            "tooltip": {"mode": "multi", "sort": "desc"},
            "legend": {"displayMode": "list", "placement": "bottom", "calcs": ["mean", "max", "lastNotNull"]}
          }
        },
        {
          "id": 5,
          "type": "table",
          "title": "All Pods Status",
          "gridPos": {"x": 0, "y": 12, "w": 24, "h": 10},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "kube_pod_status_phase",
              "legendFormat": "{{pod}}",
              "refId": "A",
              "instant": true,
              "format": "table"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "expr": "kube_pod_ready",
              "legendFormat": "{{pod}}",
              "refId": "B",
              "instant": true,
              "format": "table"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "cellOptions": {"type": "auto"},
                "inspect": false
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "green", "value": null}]
              },
              "color": {"mode": "thresholds"}
            },
            "overrides": [
              {
                "matcher": {"id": "byName", "options": "pod"},
                "properties": [{"id": "displayName", "value": "Pod"}]
              },
              {
                "matcher": {"id": "byName", "options": "namespace"},
                "properties": [{"id": "displayName", "value": "Namespace"}]
              },
              {
                "matcher": {"id": "byName", "options": "phase"},
                "properties": [
                  {"id": "displayName", "value": "Phase"},
                  {"id": "custom.cellOptions", "value": {"type": "color-background"}},
                  {
                    "id": "mappings",
                    "value": [
                      {"type": "value", "options": {
                        "Running":  {"color": "green",  "index": 0},
                        "Pending":  {"color": "yellow", "index": 1},
                        "Failed":   {"color": "red",    "index": 2},
                        "Succeeded":{"color": "blue",   "index": 3},
                        "Unknown":  {"color": "grey",   "index": 4}
                      }}
                    ]
                  }
                ]
              },
              {
                "matcher": {"id": "byName", "options": "Value #B"},
                "properties": [
                  {"id": "displayName", "value": "Ready"},
                  {"id": "mappings", "value": [
                    {"type": "value", "options": {
                      "1": {"text": "Yes", "color": "green", "index": 0},
                      "0": {"text": "No",  "color": "red",   "index": 1}
                    }}
                  ]},
                  {"id": "custom.cellOptions", "value": {"type": "color-background"}}
                ]
              }
            ]
          },
          "options": {
            "showHeader": true,
            "cellHeight": "sm",
            "footer": {"show": false, "reducer": ["sum"], "enablePagination": false}
          },
          "transformations": [
            {
              "id": "merge",
              "options": {}
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "instance": true,
                  "job": true,
                  "container": true,
                  "uid": true
                },
                "indexByName": {
                  "pod": 0,
                  "namespace": 1,
                  "phase": 2,
                  "Value #B": 3
                },
                "renameByName": {}
              }
            }
          ]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "duckops123"
            - name: GF_SERVER_ROOT_URL
              value: "https://grafana.raycode.tech"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards-config
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboard-services
              mountPath: /var/lib/grafana/dashboards/services.json
              subPath: services.json
            - name: dashboard-k8s
              mountPath: /var/lib/grafana/dashboards/k8s.json
              subPath: k8s.json
            - name: dashboard-business
              mountPath: /var/lib/grafana/dashboards/business.json
              subPath: business.json
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-config
          configMap:
            name: grafana-dashboards-config
        - name: dashboard-services
          configMap:
            name: grafana-dashboard-services
        - name: dashboard-k8s
          configMap:
            name: grafana-dashboard-k8s
        - name: dashboard-business
          configMap:
            name: grafana-dashboard-business
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: monitoring
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: grafana.raycode.tech
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
