---
- name: Deploy application to Kubernetes
  hosts: all
  connection: local
  gather_facts: false

  vars:
    project_name: "{{ project_name }}"
    k8s_namespace: "{{ k8s_namespace }}"
    database_url: "{{ database_url }}"
    registry: "k3d-duckops-registry:5111"
    app_port: 3000
    ingress_host: >-
      {{ (project_name + '-' + (github_username | default('duckops')) + '-duckops.' + (platform_domain | default('raycode.tech')))
      if (is_cloud | default(false) | bool) else (project_name + '.localhost') }}

  tasks:
    - name: Ensure namespace exists
      ansible.builtin.shell: |
        kubectl get namespace {{ k8s_namespace }} 2>/dev/null || \
        kubectl create namespace {{ k8s_namespace }}
      register: ns_check
      changed_when: "'created' in ns_check.stdout"

    - name: Create Image Pull Secret (ECR)
      ansible.builtin.shell: |
        kubectl create secret docker-registry regcred \
          --docker-server={{ ecr_registry }} \
          --docker-username=AWS \
          --docker-password="{{ ecr_token }}" \
          --namespace {{ k8s_namespace }} \
          --dry-run=client -o yaml | kubectl apply -f -
      when: is_cloud | default(false) | bool
      changed_when: true

    - name: Create ConfigMap for project
      ansible.builtin.shell: |
        kubectl create configmap {{ project_name }}-config \
          --from-literal=DATABASE_URL='{{ database_url }}' \
          --from-literal=NODE_ENV=production \
          --namespace {{ k8s_namespace }} \
          --dry-run=client -o yaml | kubectl apply -f -
      changed_when: true

    - name: Apply Kubernetes deployment manifest
      ansible.builtin.shell: |
        kubectl apply -f /tmp/duckops-projects/{{ project_name }}/k8s/deployment.yaml
      changed_when: true

    - name: Apply Kubernetes service manifest
      ansible.builtin.shell: |
        kubectl apply -f /tmp/duckops-projects/{{ project_name }}/k8s/service.yaml
      changed_when: true

    - name: Apply dynamic Ingress for project
      ansible.builtin.shell: |
        cat <<EOF | kubectl apply -f -
        apiVersion: networking.k8s.io/v1
        kind: Ingress
        metadata:
          name: {{ project_name }}
          namespace: {{ k8s_namespace }}
          annotations:
            traefik.ingress.kubernetes.io/router.entrypoints: web
        spec:
          rules:
          - host: "{{ ingress_host }}"
            http:
              paths:
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: {{ project_name }}
                    port:
                      number: 80
        EOF
      changed_when: true

    - name: Wait for deployment rollout
      ansible.builtin.shell: |
        kubectl rollout status deployment/{{ project_name }} \
          -n {{ k8s_namespace }} \
          --timeout=120s
      changed_when: false
