---
- name: Setup Docker and K3s on server
  hosts: all
  become: true

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Install dependencies
      ansible.builtin.apt:
        name:
          - curl
          - wget
          - git
          - build-essential
          - apt-transport-https
          - ca-certificates
          - gnupg
        state: present
      when: ansible_os_family == "Debian"

    - name: Install Docker
      ansible.builtin.shell: curl -fsSL https://get.docker.com | sh
      args:
        creates: /usr/bin/docker

    - name: Add user to docker group
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes

    - name: Install K3s
      ansible.builtin.shell: curl -sfL https://get.k3s.io | sh -s - --write-kubeconfig-mode 644
      args:
        creates: /usr/local/bin/k3s

    - name: Check if swap is already configured
      ansible.builtin.stat:
        path: /swapfile
      register: swapfile_stat

    - name: Create 2GB swap file
      ansible.builtin.command: fallocate -l 2G /swapfile
      when: not swapfile_stat.stat.exists
      changed_when: true

    - name: Set swap file permissions
      ansible.builtin.file:
        path: /swapfile
        mode: '0600'
      when: not swapfile_stat.stat.exists

    - name: Format swap file
      ansible.builtin.command: mkswap /swapfile
      when: not swapfile_stat.stat.exists
      changed_when: true

    - name: Enable swap
      ansible.builtin.command: swapon /swapfile
      when: not swapfile_stat.stat.exists
      changed_when: true

    - name: Persist swap in fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        line: '/swapfile none swap sw 0 0'
        state: present

    - name: Set swappiness to 10 (prefer RAM, use swap only under pressure)
      ansible.posix.sysctl:
        name: vm.swappiness
        value: '10'
        state: present
        sysctl_set: yes
        reload: yes

    - name: Install Node.js 22
      ansible.builtin.shell: |
        curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
        apt-get install -y nodejs
      when: ansible_os_family == "Debian"
      args:
        creates: /usr/bin/node
