---
- name: Setup Docker and K3s on server
  hosts: all
  become: true

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Install dependencies
      ansible.builtin.apt:
        name:
          - curl
          - wget
          - git
          - build-essential
          - apt-transport-https
          - ca-certificates
          - gnupg
        state: present
      when: ansible_os_family == "Debian"

    - name: Download Docker install script
      ansible.builtin.get_url:
        url: https://get.docker.com
        dest: /tmp/get-docker.sh
        mode: "0755"
      when: not (ansible_check_mode | default(false))

    - name: Install Docker
      ansible.builtin.shell: /tmp/get-docker.sh
      args:
        creates: /usr/bin/docker
      changed_when: true

    - name: Add user to docker group
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true

    - name: Download K3s install script
      ansible.builtin.get_url:
        url: https://get.k3s.io
        dest: /tmp/get-k3s.sh
        mode: "0755"
      when: not (ansible_check_mode | default(false))

    - name: Install K3s
      ansible.builtin.shell: /tmp/get-k3s.sh --write-kubeconfig-mode 644
      args:
        creates: /usr/local/bin/k3s
      changed_when: true

    - name: Check if swap is already configured
      ansible.builtin.stat:
        path: /swapfile
      register: swapfile_stat

    - name: Create 2GB swap file
      ansible.builtin.command: fallocate -l 2G /swapfile
      when: not swapfile_stat.stat.exists
      changed_when: true

    - name: Set swap file permissions
      ansible.builtin.file:
        path: /swapfile
        mode: "0600"
      when: not swapfile_stat.stat.exists

    - name: Format swap file
      ansible.builtin.command: mkswap /swapfile
      when: not swapfile_stat.stat.exists
      changed_when: true

    - name: Enable swap
      ansible.builtin.command: swapon /swapfile
      when: not swapfile_stat.stat.exists
      changed_when: true

    - name: Persist swap in fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        line: "/swapfile none swap sw 0 0"
        state: present

    - name: Set swappiness to 10
      ansible.builtin.command: sysctl -w vm.swappiness=10
      changed_when: true

    - name: Persist swappiness setting
      ansible.builtin.lineinfile:
        path: /etc/sysctl.conf
        regexp: "^vm.swappiness"
        line: "vm.swappiness=10"
        state: present

    - name: Download NodeSource setup script
      ansible.builtin.get_url:
        url: https://deb.nodesource.com/setup_22.x
        dest: /tmp/nodesource_setup.sh
        mode: "0755"
      when:
        - ansible_os_family == "Debian"
        - not (ansible_check_mode | default(false))

    - name: Run NodeSource setup script
      ansible.builtin.shell: /tmp/nodesource_setup.sh
      when:
        - ansible_os_family == "Debian"
        - not ('/usr/bin/node' is file)
      changed_when: true

    - name: Install Node.js 22
      ansible.builtin.apt:
        name: nodejs
        state: present
      when: ansible_os_family == "Debian"
