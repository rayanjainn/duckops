---
- name: Configure Prometheus + Grafana monitoring
  hosts: all
  connection: local
  gather_facts: false

  tasks:
    - name: Add Prometheus Helm repo
      ansible.builtin.shell: helm repo add prometheus-community https://prometheus-community.github.io/helm-charts && helm repo update
      changed_when: true

    - name: Create monitoring namespace
      ansible.builtin.shell: kubectl create namespace monitoring 2>/dev/null || true
      changed_when: false

    - name: Install kube-prometheus-stack
      ansible.builtin.shell: |
        helm upgrade --install monitoring prometheus-community/kube-prometheus-stack \
          --namespace monitoring \
          --set grafana.service.type=NodePort \
          --set grafana.service.nodePort=30001 \
          --set prometheus.service.type=NodePort \
          --set prometheus.service.nodePort=30002 \
          --wait --timeout=300s
      changed_when: true
