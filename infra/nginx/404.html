<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — DuckOps</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0f;
      color: #e2e8f0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container { text-align: center; padding: 2rem; max-width: 480px; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(245,158,11,0.1);
      border: 1px solid rgba(245,158,11,0.25);
      color: #f59e0b;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 999px;
      margin-bottom: 2rem;
    }
    .badge::before { content: ''; width: 6px; height: 6px; background: #f59e0b; border-radius: 50%; display: inline-block; }
    h1 {
      font-size: 5rem;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }
    h2 { font-size: 1.25rem; font-weight: 600; color: #f1f5f9; margin-bottom: 0.5rem; }
    p { font-size: 0.875rem; color: #64748b; line-height: 1.6; margin-bottom: 2rem; }
    .host {
      display: inline-block;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.75rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: #94a3b8;
      padding: 6px 12px;
      border-radius: 6px;
      margin-bottom: 2rem;
    }
    .actions { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
    a.btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.15s;
    }
    a.btn-primary { background: #f59e0b; color: #0a0a0f; }
    a.btn-primary:hover { background: #fbbf24; }
    a.btn-secondary {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #94a3b8;
    }
    a.btn-secondary:hover { background: rgba(255,255,255,0.08); color: #e2e8f0; }
    .grid {
      position: fixed; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(245,158,11,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,158,11,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
  </style>
</head>
<body>
  <div class="grid"></div>
  <div class="container">
    <div class="badge">DuckOps</div>
    <h1>404</h1>
    <h2>Project not deployed here</h2>
    <p>This subdomain isn't running a project yet — or the deployment is still in progress.</p>
    <div class="host" id="host"></div>
    <div class="actions">
      <a class="btn btn-primary" href="https://app.raycode.tech">Open DuckOps</a>
      <a class="btn btn-secondary" href="https://app.raycode.tech/projects">View Projects</a>
    </div>
  </div>
  <script>document.getElementById('host').textContent = window.location.host;</script>
</body>
</html>
