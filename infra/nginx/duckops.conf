# DuckOps nginx — EC2 only
# app.raycode.tech is handled by Vercel (CNAME in DNS), not nginx

# Redact ?token= from logs to prevent JWT leakage
log_format duckops_safe '$remote_addr - $remote_user [$time_local] '
                        '"$request_method $uri [token_redacted] $server_protocol" '
                        '$status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent"';

server {
    listen 80;
    server_name raycode.tech api.raycode.tech *.raycode.tech;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.raycode.tech;

    ssl_certificate     /etc/letsencrypt/live/raycode.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/raycode.tech/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    client_max_body_size 50m;
    access_log /var/log/nginx/api.access.log duckops_safe;

    location /health { proxy_pass http://localhost:4002; include /etc/nginx/proxy_params; }
    location /api/auth      { proxy_pass http://localhost:4002; include /etc/nginx/proxy_params; }
    location /api/projects  { proxy_pass http://localhost:4002; include /etc/nginx/proxy_params; }
    location /api/billing   { proxy_pass http://localhost:4002; include /etc/nginx/proxy_params; }
    location /api/templates { proxy_pass http://localhost:4001; include /etc/nginx/proxy_params; }
    location /api/options   { proxy_pass http://localhost:4001; include /etc/nginx/proxy_params; }
    location /api/health    { proxy_pass http://localhost:4004; include /etc/nginx/proxy_params; }
    location /api/logs      { proxy_pass http://localhost:4004; include /etc/nginx/proxy_params; }
    location /api/platform  {
        proxy_pass http://localhost:4004;
        proxy_buffering off;
        proxy_read_timeout 300s;
        include /etc/nginx/proxy_params;
    }
    location /api/pipelines {
        proxy_pass http://localhost:4003;
        proxy_buffering off;
        proxy_read_timeout 300s;
        include /etc/nginx/proxy_params;
    }
    location /api/generate {
        proxy_pass http://localhost:4005;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_set_header Connection "";
        include /etc/nginx/proxy_params;
    }
    location /api/stack {
        proxy_pass http://localhost:4005;
        include /etc/nginx/proxy_params;
    }
    location /socket.io/ {
        proxy_pass http://localhost:4002;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        include /etc/nginx/proxy_params;
    }
}

server {
    listen 443 ssl;
    server_name jenkins.raycode.tech;

    ssl_certificate     /etc/letsencrypt/live/raycode.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/raycode.tech/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    client_max_body_size 50m;
    access_log /var/log/nginx/jenkins.access.log duckops_safe;

    location / {
        proxy_pass         http://localhost:8085;
        include            /etc/nginx/proxy_params;
        proxy_read_timeout 90s;

        # Jenkins issues redirects to http://localhost:8085/... — rewrite them to https://jenkins.raycode.tech/...
        proxy_redirect     http://localhost:8085 https://jenkins.raycode.tech;

        # Required for Jenkins to know it's behind a reverse proxy
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  443;
        proxy_set_header   X-Forwarded-Proto https;
    }
}

server {
    listen 443 ssl;
    server_name *.raycode.tech;

    ssl_certificate     /etc/letsencrypt/live/raycode.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/raycode.tech/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /var/www;
    error_page 404 502 503 504 =404 /duckops-404.html;

    location = /duckops-404.html {
        internal;
    }

    location / {
        proxy_pass http://localhost:30080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_intercept_errors on;
    }
}
