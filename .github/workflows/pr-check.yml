name: PR Check

on:
  pull_request:
    branches: [main]

env:
  PNPM_VERSION: "9.15.4"
  NODE_VERSION: "22"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    name: Type Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm exec turbo run build --filter=@duckops/db --filter=@duckops/shared-utils --filter=@duckops/shared-types

      - name: Type check
        run: pnpm -r lint

      - name: Check for .env secrets accidentally committed
        run: |
          if grep -r "AKIAY42KDOWY\|sk_live_\|sk_test_" --include="*.ts" --include="*.tsx" --include="*.js" .; then
            echo "ERROR: Possible secret found in source files"
            exit 1
          fi
          echo "No secrets found in source files"

  validate-infra:
    name: Validate Infra
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.0"

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: infra/terraform

      - name: Terraform Validate
        run: terraform validate
        working-directory: infra/terraform

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: infra/terraform

      - name: Install ansible-lint
        run: pip install ansible-lint

      - name: Ansible Lint
        run: ansible-lint infra/ansible/playbooks/
        continue-on-error: true
