name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PNPM_VERSION: "9.15.4"
  NODE_VERSION: "22"

jobs:
  # ── 1. Type-check on every push/PR ─────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prod=false

      - name: Build shared packages
        run: |
          pnpm --filter @duckops/db build
          pnpm --filter @duckops/shared-utils build
          pnpm --filter @duckops/shared-types build

      - name: Type check all services
        run: pnpm -r lint

  # ── 2. Deploy backend to EC2 on push to main ───────────────────────────────
  deploy-backend:
    name: Deploy Backend to EC2
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Rsync code to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: /opt/duckops
          rm: false
          strip_components: 0
          exclude: |
            node_modules
            .git
            dist
            .next
            .env
            "*.log"
            .turbo
            .claude
            .code-review-graph

      - name: Build & restart services on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /opt/duckops

            # Install deps (including devDeps for tsc)
            pnpm install --frozen-lockfile --prod=false

            # Build all services (skips web — Vercel handles that)
            pnpm --filter @duckops/db build
            pnpm --filter @duckops/shared-utils build
            pnpm --filter @duckops/shared-types build
            pnpm --filter provisioning-service build
            pnpm --filter pipeline-service build
            pnpm --filter health-service build
            pnpm --filter ai-service build
            pnpm --filter catalog-service build

            # Run DB migrations
            cd packages/db
            pnpm exec prisma migrate deploy
            cd /opt/duckops

            # Reload PM2 with updated env (zero-downtime)
            set -a && source .env && set +a
            pm2 reload ecosystem.config.js --update-env

            echo "Backend deploy complete: ${{ github.sha }}"

  # ── 3. Deploy frontend to Vercel on push to main ───────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: apps/web
          vercel-args: "--prod"
