events {
    worker_connections 1024;
}

http {
    upstream catalog {
        server catalog-service:4001;
    }

    upstream provisioning {
        server provisioning-service:4002;
    }

    upstream pipeline {
        server pipeline-service:4003;
    }

    upstream health {
        server health-service:4004;
    }

    upstream ai {
        server ai-service:4005;
    }

    server {
        listen 80;

        # CORS headers
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization";

        # Catalog Service routes
        location /api/templates {
            proxy_pass http://catalog;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/options {
            proxy_pass http://catalog;
            proxy_set_header Host $host;
        }

        # Auth routes (GitHub OAuth + JWT)
        location /api/auth {
            proxy_pass http://provisioning;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Provisioning Service routes
        location /api/projects {
            proxy_pass http://provisioning;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/billing {
            proxy_pass http://provisioning;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Pipeline Service routes
        location /api/pipelines {
            proxy_pass http://pipeline;
            proxy_set_header Host $host;
        }

        # Health & Logs routes
        location /api/health {
            proxy_pass http://health;
            proxy_set_header Host $host;
        }

        location /api/logs {
            proxy_pass http://health;
            proxy_set_header Host $host;
        }

        # AI Service routes (SSE streaming — no buffering)
        location /api/ai {
            proxy_pass http://ai;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Connection "";
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
        }

        # WebSocket support for Socket.io real-time updates
        location /socket.io/ {
            proxy_pass http://provisioning;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Health check for gateway itself
        location /health {
            return 200 '{"status":"ok","service":"nginx-gateway"}';
            add_header Content-Type application/json;
        }
    }
}
